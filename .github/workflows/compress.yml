name: Compress Images

on:
  push:
    branches:
      - raw

permissions:
  contents: write

jobs:
  compress-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout raw branch
        uses: actions/checkout@v4
        with:
          ref: raw
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim pngquant optipng

      - name: Compress JPEGs
        run: |
          # 限制 jpg 图片最大为 512KB
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" \) -exec jpegoptim --size=512k {} + || true

      - name: Compress PNGs
        run: |
          # 找出大于1M的PNG进行压缩
          find . -type f -iname "*.png" -size +1M -exec bash -c 'pngquant --ext .png --force --speed 1 "$1" || optipng -o2 "$1"' _ {} \;

      - name: Commit and Push to master
        run: |
          # 强制基于当前压缩后的结果创建一个新的 master 分支
          git checkout -B master
          git add .
          git commit -m "Auto compress images to < 1MB [skip ci]" || echo "No changes to commit"
          git push -f origin master
