name: Compress Images

on:
  push:
    branches:
      - raw

permissions:
  contents: write

jobs:
  compress-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout raw branch
        uses: actions/checkout@v4
        with:
          ref: raw
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Convert to WebP and Compress
        run: |
          # 定义处理函数
          process_image() {
            local file="$1"
            # 先使用默认画质 20 转换并压缩
            cwebp -q 20 "$file" -o "${file%.*}.webp" -quiet
            
            # 检查生成的文件大小 (128KB =  131072 Bytes)
            local size=$(stat -c%s "${file%.*}.webp")
            if [ $size -gt 131072 ]; then
               # 如果仍然大于 128KB，尝试强行限制在 128000 Bytes 以下
               cwebp -size 128000 "$file" -o "${file%.*}.webp" -quiet
            fi
            
            # 成功生成 webp 后，删除原来的大图
            rm -f "$file"
          }
          export -f process_image
          
          # 找出所有 jpg/jpeg/png 文件并使用 xargs 并行转换
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -print0 | xargs -0 -n 1 -P $(nproc) bash -c 'process_image "$@"' _

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # 使用 aws-cli 同步到 Cloudflare R2，并排除非图片相关的文件及目录
          aws s3 sync . s3://$R2_BUCKET/ \
            --endpoint-url https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "scripts/*" \
            --exclude ".DS_Store" \
            --exclude "README.md"

      - name: Commit and Push to master
        run: |
          # 强制基于当前压缩后的结果创建一个新的 master 分支
          git checkout -B master
          git add .
          git commit -m "Auto convert to WebP (< 128KB) [skip ci]" || echo "No changes to commit"
          git push -f origin master
