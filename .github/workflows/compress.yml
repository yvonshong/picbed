name: Compress Images

on:
  push:
    branches:
      - raw

permissions:
  contents: write

jobs:
  compress-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout raw branch
        uses: actions/checkout@v4
        with:
          ref: raw
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Convert to WebP and Compress
        run: |
          # 定义处理函数
          process_image() {
            local file="$1"
            # 先使用默认画质 20 转换并压缩
            cwebp -q 20 "$file" -o "${file%.*}.webp" -quiet
            
            # 检查生成的文件大小 (128KB =  131072 Bytes)
            local size=$(stat -c%s "${file%.*}.webp")
            if [ $size -gt 131072 ]; then
               # 如果仍然大于 128KB，尝试强行限制在 128000 Bytes 以下
               cwebp -size 128000 "$file" -o "${file%.*}.webp" -quiet
            fi
            
            # 成功生成 webp 后，删除原来的大图
            rm -f "$file"
          }
          export -f process_image
          
          # 找出所有 jpg/jpeg/png 文件并使用 xargs 并行转换
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -print0 | xargs -0 -n 1 -P $(nproc) bash -c 'process_image "$@"' _

      - name: Upload to Qiniu
        env:
          QINIU_AK: ${{ secrets.QINIU_AK }}
          QINIU_SK: ${{ secrets.QINIU_SK }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        run: |
          # 下载七牛云官方命令行工具 qshell
          wget -q https://devtools.qiniu.com/qshell-v2.13.0-linux-amd64.tar.gz
          tar -xzf qshell-v2.13.0-linux-amd64.tar.gz
          sudo mv qshell /usr/local/bin/qshell
          chmod +x /usr/local/bin/qshell
          
          # 鉴权
          qshell account $QINIU_AK $QINIU_SK "github-actions"
          
          # 生成上传配置文件，排除 .git 等非图片目录/文件
          cat > qupload.conf << EOF
          {
            "src_dir": ".",
            "bucket": "$QINIU_BUCKET",
            "overwrite": true,
            "rescan_local": true,
            "skip_path_prefixes": ".git/,.github/,scripts/",
            "skip_fixed_strings": ".DS_Store,README.md,qupload.conf,qshell-v2.13.0-linux-amd64.tar.gz"
          }
          EOF
          
          # 并发10线程上传到七牛云
          qshell qupload 10 qupload.conf

      - name: Commit and Push to master
        run: |
          # 强制基于当前压缩后的结果创建一个新的 master 分支
          git checkout -B master
          git add .
          git commit -m "Auto convert to WebP (< 128KB) [skip ci]" || echo "No changes to commit"
          git push -f origin master
